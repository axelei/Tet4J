<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Tet4J</title>
        <meta http-equiv="Content-Type" content="text/html;charset=utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }
            html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

            #game-container {
                width: 100vw;
                height: 100vh;
                overflow: hidden;
                position: relative;
            }

            #canvas {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                min-width: 100%;
                min-height: 100%;
                max-width: none;
                max-height: none;
            }

        </style>
    </head>
    <body oncontextmenu="return false">
        <div id="game-container">
            <canvas id="canvas"></canvas>
        </div>

        <script type="text/javascript" charset="utf-8" src="scripts/gdx.wasm.js"></script>
        <script type="text/javascript" charset="utf-8" src="scripts/freetype.js"></script>
        <script type="text/javascript" charset="utf-8" src="scripts/howler.js"></script>
        <script>
            async function start() {
                main()
            }
            window.addEventListener("load", start);
        </script>
        <script type="text/javascript" charset="utf-8" src="app.js"></script>
    </body>
</html>
