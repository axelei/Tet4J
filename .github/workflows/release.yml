name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write
  packages: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            gradle: ./gradlew
            package: :lwjgl3:packageLinuxX64
            artifact-id: linux-x64
          - os: windows-latest
            gradle: .\gradlew.bat
            package: :lwjgl3:packageWinX64
            artifact-id: win-x64
          - os: macos-latest
            gradle: ./gradlew
            package: :lwjgl3:packageMacX64
            artifact-id: mac-x64
          - os: macos-latest
            gradle: ./gradlew
            package: :lwjgl3:packageMacM1
            artifact-id: mac-m1

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4.2.0

      - uses: actions/setup-java@v4.3.0
        with:
          distribution: temurin
          java-version: 21

      - run: chmod +x gradlew
        if: runner.os != 'Windows'

      - run: ${{ matrix.gradle }} ${{ matrix.package }}

      - uses: actions/upload-artifact@v4.4.3
        with:
          name: construo-${{ matrix.artifact-id }}
          path: lwjgl3/build/construo/dist/*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4.2.0
        with:
          fetch-depth: 0

      - name: Generate changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 @^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            git log --oneline --no-merges > changelog.txt
          else
            git log --oneline --no-merges "$PREV_TAG"..@ > changelog.txt
          fi

      - name: Download packages
        uses: actions/download-artifact@v4.1.8
        with:
          pattern: construo-*
          merge-multiple: true
          path: packages

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          {
            echo "## Tet4J $VERSION"
            echo ""
            echo "A new version of Tet4J has been released!"
            echo ""
            echo "### Changes since last release"
            echo ""
            cat changelog.txt
          } > release-notes.md
          gh release create "$GITHUB_REF_NAME" \
            --title "Tet4J $GITHUB_REF_NAME" \
            --notes-file release-notes.md \
            packages/*.zip

      - name: Bump projectVersion on main
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git fetch origin main
          git checkout main
          sed -i "s/^projectVersion=.*/projectVersion=$VERSION/" gradle.properties
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add gradle.properties
          git commit -m "Bump version to $VERSION [skip ci]"
          git push
